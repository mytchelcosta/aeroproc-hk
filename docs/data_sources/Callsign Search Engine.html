        body {

            background-color: #050b14; /* Deep, dark radar background */
            color: #f8fafc;
            overflow-y: scroll;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(56, 189, 248, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #38bdf8; }

        /* Tab Active States */
        .tab-btn { transition: all 0.2s ease-in-out; }
        .tab-btn.active {
            background-color: rgba(14, 165, 233, 0.15);
            border-color: #0ea5e9;
            color: #38bdf8;
        }

        /* File Drop Zone */
        .drop-zone {
            border: 2px dashed rgba(56, 189, 248, 0.3);
            transition: all 0.2s ease-in-out;
        }
        .drop-zone.dragover {
            background-color: rgba(14, 165, 233, 0.1);
            border-color: #0ea5e9;
        }

        // === DOM ELEMENTS ===
        const tbody = document.getElementById('tableBody');
        const thead = document.getElementById('tableHead');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('no-results');
        const countDisplay = document.getElementById('countDisplay');
        const uploadOverlay = document.getElementById('uploadOverlay');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const limitWarning = document.getElementById('limit-warning');
        const statusIndicator = document.getElementById('statusIndicator');

        // === TAB CONFIGURATION ===
        const tabConfigs = {
            hkfir: { 
                name: "HK FIR Reference",
                columns: ["ICAO", "Airline Name", "Radio Callsign", "Primary Fleet"],
                renderRow: (item) => `
                    <td class="p-4 border-b border-slate-800/80"><span class="inline-flex items-center px-2 py-1 rounded bg-sky-900/40 text-sky-400 font-mono text-sm font-bold border border-sky-800/50">${item.icao}</span></td>
                    <td class="p-4 border-b border-slate-800/80 font-medium text-slate-200">${item.name}</td>
                    <td class="p-4 border-b border-slate-800/80"><span class="font-mono text-emerald-400 font-semibold tracking-wide">${item.callsign}</span></td>
                    <td class="p-4 border-b border-slate-800/80 text-slate-400 text-sm">${item.fleet}</td>
                `,
                searchKeys: ['icao', 'name', 'callsign', 'fleet']
            },
            airlines: {
                name: "Global Airlines DB",
                reqFile: "ICAO_Airlines.txt",
                columns: ["ICAO", "Company Name", "Callsign", "Country"],
                renderRow: (item) => `
                    <td class="p-4 border-b border-slate-800/80"><span class="inline-flex items-center px-2 py-1 rounded bg-indigo-900/40 text-indigo-400 font-mono text-sm font-bold border border-indigo-800/50">${item[0]}</span></td>
                    <td class="p-4 border-b border-slate-800/80 font-medium text-slate-200">${item[1]}</td>
                    <td class="p-4 border-b border-slate-800/80"><span class="font-mono text-amber-400 font-semibold tracking-wide">${item[2] || 'N/A'}</span></td>
                    <td class="p-4 border-b border-slate-800/80 text-slate-400 text-sm">${item[3] || ''}</td>
                `
            },
            aircraft: {
                name: "Global Aircraft DB",
                reqFile: "ICAO_Aircraft.txt",
                columns: ["Designator", "Type/WTC", "Manufacturer", "Model"],
                renderRow: (item) => `
                    <td class="p-4 border-b border-slate-800/80"><span class="inline-flex items-center px-2 py-1 rounded bg-rose-900/40 text-rose-400 font-mono text-sm font-bold border border-rose-800/50">${item[0]}</span></td>
                    <td class="p-4 border-b border-slate-800/80 text-slate-400 font-mono text-sm">${item[1]}</td>
                    <td class="p-4 border-b border-slate-800/80 text-slate-300">${item[2]}</td>
                    <td class="p-4 border-b border-slate-800/80 font-medium text-slate-200">${item[3]}</td>
                `
            },
            airports: {
                name: "Global Airports DB",
                reqFile: "ICAO_Airports.txt",
                columns: ["ICAO", "Airport Name / City", "Country"],
                renderRow: (item) => `
                    <td class="p-4 border-b border-slate-800/80"><span class="inline-flex items-center px-2 py-1 rounded bg-teal-900/40 text-teal-400 font-mono text-sm font-bold border border-teal-800/50">${item[0]}</span></td>
                    <td class="p-4 border-b border-slate-800/80 font-medium text-slate-200">${item[1]}</td>
                    <td class="p-4 border-b border-slate-800/80 text-slate-400 text-sm">${item[2]}</td>
                `
            }
        };

        // === UI RENDERING ===
        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            const config = tabConfigs[tabId];
            statusIndicator.innerText = config.name;
            searchInput.value = ''; // clear search on tab switch

            // Setup Table Headers
            thead.innerHTML = `<tr>${config.columns.map(col => `<th class="p-4 font-semibold">${col}</th>`).join('')}</tr>`;

            if (tabId === 'hkfir') {
                uploadOverlay.classList.add('hidden');
                executeSearch('');
            } else {
                if (!globalData[tabId]) {
                    // Needs file upload
                    tbody.innerHTML = '';
                    countDisplay.innerText = '0';
                    noResults.classList.add('hidden');
                    limitWarning.classList.add('hidden');
                    document.getElementById('uploadTitle').innerText = `Load ${config.reqFile}`;
                    document.getElementById('uploadDesc').innerText = `Drag and drop your ${config.reqFile} here to unlock the global database.`;
                    uploadOverlay.classList.remove('hidden');
                } else {
                    uploadOverlay.classList.add('hidden');
                    executeSearch('');
                }
            }
        }

        function executeSearch(query) {
            query = query.toLowerCase().trim();
            let dataToRender = [];
            const config = tabConfigs[currentTab];

            if (currentTab === 'hkfir') {
                dataToRender = hkFirData.filter(a => 
                    a.icao.toLowerCase().includes(query) || 
                    a.callsign.toLowerCase().includes(query) || 
                    a.name.toLowerCase().includes(query) ||
                    a.fleet.toLowerCase().includes(query)
                );
                
                // Prioritize Exact Match
                dataToRender.sort((a, b) => {
                    const aExact = a.icao.toLowerCase() === query;
                    const bExact = b.icao.toLowerCase() === query;
                    if (aExact && !bExact) return -1;
                    if (!aExact && bExact) return 1;
                    return a.icao.localeCompare(b.icao);
                });

            } else {
                // Global DB Search
                const dataset = globalData[currentTab];
                if (!dataset) return;

                if (query === '') {
                    dataToRender = dataset; 
                } else {
                    dataToRender = dataset.filter(row => {
                        return row.some(col => col && col.toLowerCase().includes(query));
                    });
                    
                    // Prioritize exact code match (Col 0)
                    dataToRender.sort((a, b) => {
                        const aExact = a[0] && a[0].toLowerCase() === query;
                        const bExact = b[0] && b[0].toLowerCase() === query;
                        if (aExact && !bExact) return -1;
                        if (!aExact && bExact) return 1;
                        return 0;
                    });
                }
            }

            renderTableData(dataToRender, config.renderRow);
        }

        function renderTableData(filteredData, renderRowFn) {
            countDisplay.innerText = filteredData.length.toLocaleString();
            tbody.innerHTML = '';

            if (filteredData.length === 0) {
                noResults.classList.remove('hidden');
                limitWarning.classList.add('hidden');
            } else {
                noResults.classList.add('hidden');
                
                // Virtualization/Limiting for massive datasets
                const renderLimit = 150; 
                const slicedData = filteredData.slice(0, renderLimit);
                
                if (filteredData.length > renderLimit) {
                    limitWarning.classList.remove('hidden');
                } else {
                    limitWarning.classList.add('hidden');
                }

                const fragment = document.createDocumentFragment();
                slicedData.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-800/50 transition-colors cursor-default";
                    tr.innerHTML = renderRowFn(item);
                    fragment.appendChild(tr);
                });
                tbody.appendChild(fragment);
            }
        }

        searchInput.addEventListener('input', (e) => executeSearch(e.target.value));

        // === FILE PARSING ENGINE ===
        function parseTSV(text, tabId) {
            const lines = text.split('\n');
            const parsed = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line || line.startsWith(';')) continue; // Skip comments/empty
                
                const parts = line.split('\t');
                if (parts.length >= 2) {
                    parsed.push(parts);
                }
            }
            
            globalData[tabId] = parsed;
            document.getElementById(`badge-${tabId}`).classList.remove('hidden');
            switchTab(tabId); // Re-trigger render
        }

        function handleFile(file) {
            if (!file || !file.name.toLowerCase().endsWith('.txt')) {
                alert("Please upload a valid .txt database file.");
                return;
            }

            // Auto-detect which file it is based on filename
            let targetTab = currentTab;
            const filename = file.name.toLowerCase();
            if (filename.includes('airlines')) targetTab = 'airlines';
            else if (filename.includes('aircraft')) targetTab = 'aircraft';
            else if (filename.includes('airports')) targetTab = 'airports';

            if (targetTab === 'hkfir') {
                alert("Please navigate to a Global Database tab to upload this file.");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => parseTSV(e.target.result, targetTab);
            reader.readAsText(file);
        }

        // === DRAG & DROP LOGIC ===
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Initialize
        switchTab('hkfir');

    </script>
</body>
</html>
