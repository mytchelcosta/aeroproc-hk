            return;
        }

        let cancelled = false;
        let timer = null;

        // Normalise ReadsB-format payload (used by adsb.lol, airplanes.live, adsb.fi)
        const normaliseReadsb = (ac) => ({
            id: ac.hex || ac.r || Math.random().toString(36),
            callsign: (ac.flight || '').trim() || ac.r || '—',
            lat: ac.lat, lon: ac.lon,
            track: typeof ac.track === 'number' ? ac.track : (ac.true_heading || 0),
            altFt: ac.alt_baro === 'ground' ? 0 : (typeof ac.alt_baro === 'number' ? ac.alt_baro : (ac.alt_geom || 0)),
            gsKts: ac.gs || 0,
            vsFpm: ac.baro_rate || ac.geom_rate || 0,
            onGround: ac.alt_baro === 'ground',
            country: '',
            type: ac.t || '',
            reg: ac.r || ''
        });

        const arp = db.fixes["VHHH"] || [22.3089, 113.9146];

        // Ordered list of feeds to try. All are free, CORS-enabled, no API key.
        const sources = [
            { name: 'adsb.lol',       url: `https://api.adsb.lol/v2/point/${arp[0]}/${arp[1]}/250` },
            { name: 'airplanes.live', url: `https://api.airplanes.live/v2/point/${arp[0]}/${arp[1]}/250` },
            { name: 'adsb.fi',        url: `https://opendata.adsb.fi/api/v2/lat/${arp[0]}/lon/${arp[1]}/dist/250` }
        ];

        const fetchTraffic = async () => {
            if (cancelled) return;
            const errors = [];
            for (const src of sources) {
                try {
                    const res = await fetch(src.url, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    const acs = (data.ac || [])
                        .filter(a => typeof a.lat === 'number' && typeof a.lon === 'number')
                        .map(normaliseReadsb);
                    if (cancelled) return;
                    setTraffic(acs);
                    setTrafficStatus({ state: 'ok', message: '', source: src.name, lastUpdate: Date.now() });
                    return;
                } catch (e) {
                    errors.push(`${src.name}: ${e.message}`);
                }
            }
            if (cancelled) return;
            const blocked = errors.every(e => /Failed to fetch|NetworkError/i.test(e));
            setTrafficStatus({
                state: 'err',
                message: blocked
                    ? 'All feeds blocked — likely an ad-blocker, VPN, or network policy. Try disabling shields/uBlock for this page.'
                    : errors.join(' · '),
                source: '', lastUpdate: Date.now()
            });
        };

        fetchTraffic();
        timer = setInterval(fetchTraffic, 4000); // poll every 4s

        return () => { cancelled = true; if (timer) clearInterval(timer); };
    }, [liveTraffic, db.fixes]);

    // Lazy-load ICAO reference tables on first need (search modal OR live traffic on)
    useEffect(() => {
        if ((!refOpen && !liveTraffic) || refDb || refLoading) return;
        let cancelled = false;
        setRefLoading(true);
        setRefError('');
        const parseTsv = (text) => text.split(/\r?\n/)
            .filter(l => l && !l.startsWith(';'))
            .map(l => l.split('\t'));
        Promise.all([
            fetch('./ICAO_Airlines.txt').then(r => r.text()),
            fetch('./ICAO_Aircraft.txt').then(r => r.text()),
            fetch('./ICAO_Airports.txt').then(r => r.text())
        ]).then(([al, ac, ap]) => {
            if (cancelled) return;
            const airlines = parseTsv(al).map(r => ({
                icao: r[0] || '', name: r[1] || '', callsign: r[2] || '', country: r[3] || ''
            }));
            const aircraft = parseTsv(ac).map(r => ({
                code: r[0] || '', config: r[1] || '', mfr: r[2] || '', desc: r[3] || ''
            }));
            const airports = parseTsv(ap).map(r => ({
                icao: r[0] || '', name: r[1] || '', country: r[2] || ''
            }));
            setRefDb({ airlines, aircraft, airports });
            setRefLoading(false);
        }).catch(e => {
            if (cancelled) return;
            setRefError(`Failed to load reference data: ${e.message}`);
            setRefLoading(false);
        });
        return () => { cancelled = true; };
    }, [refOpen, liveTraffic, refDb, refLoading]);

    // Fast type-code → aircraft row lookup (for WTC letter)
    const typeMap = React.useMemo(() => {
        if (!refDb) return null;
        const m = new Map();
        refDb.aircraft.forEach(a => { if (a.code) m.set(a.code.toUpperCase(), a); });
        return m;
    }, [refDb]);

    // Filtered reference results (capped per category)
    const refResults = React.useMemo(() => {
        if (!refDb || !refQuery.trim()) return null;
        const q = refQuery.trim().toUpperCase();
        const match = (s) => (s || '').toUpperCase().includes(q);
        const cap = 25;
        return {
            airlines: refDb.airlines.filter(a => match(a.icao) || match(a.name) || match(a.callsign) || match(a.country)).slice(0, cap),
            aircraft: refDb.aircraft.filter(a => match(a.code) || match(a.mfr)  || match(a.desc)    || match(a.config)).slice(0, cap),
            airports: refDb.airports.filter(a => match(a.icao) || match(a.name) || match(a.country)).slice(0, cap)
        };
    }, [refDb, refQuery]);

    // Background route lookup (callsign → ORIG/DEST) via adsbdb.com
    useEffect(() => {
        if (!liveTraffic) return;
        const needed = traffic
            .map(ac => ac.callsign)
            .filter(cs => cs && cs !== '—' && !(cs in routes) && !routeFetchingRef.current.has(cs));
        if (!needed.length) return;
        let cancelled = false;
        needed.forEach(cs => {
            routeFetchingRef.current.add(cs);
            fetch(`https://api.adsbdb.com/v0/callsign/${encodeURIComponent(cs)}`, { cache: 'force-cache' })
                .then(r => r.ok ? r.json() : null)
                .then(data => {
                    if (cancelled) return;
                    const fr = data && data.response && data.response.flightroute;
                    setRoutes(prev => ({
                        ...prev,
                        [cs]: fr ? { orig: fr.origin?.icao_code || '', dest: fr.destination?.icao_code || '' }
                                 : { orig: '', dest: '' }
                    }));
                })
                .catch(() => {
                    if (cancelled) return;
                    setRoutes(prev => ({ ...prev, [cs]: { orig: '', dest: '' } }));
                });
        });
        return () => { cancelled = true; };
    }, [traffic, liveTraffic]);

    // Render live traffic markers when data changes
    useEffect(() => {
        const lg = trafficLgRef.current;
        const map = fgRef.current && fgRef.current.map;
        if (!lg || !map) return;
        lg.clearLayers();
        if (!liveTraffic) return;

        const arp = db.fixes["VHHH"] || [22.3089, 113.9146];
        const classifyDir = (ac) => {
            if (ac.onGround) return 'ground';
            // Primary: trust the flight-route lookup (origin / destination ICAO)
            const rt = routes[ac.callsign];
            if (rt && (rt.orig || rt.dest)) {
                if (rt.dest === 'VHHH') return 'inbound';
                if (rt.orig === 'VHHH') return 'outbound';
                return 'crossing';
            }
            // Fallback (route unknown yet): tight heuristic — near + climbing/descending.
            const latR = ac.lat * Math.PI / 180;
            const dLat = arp[0] - ac.lat;
            const dLon = (arp[1] - ac.lon) * Math.cos(latR);
            const distNM = Math.sqrt(dLat * dLat + dLon * dLon) * 60;
            if (distNM > 60) return 'crossing';
            if (ac.altFt > 16000 && Math.abs(ac.vsFpm) < 500) return 'crossing';
            if (ac.altFt < 14000 && ac.vsFpm < -200) return 'inbound';
            if (ac.altFt < 14000 && ac.vsFpm >  200) return 'outbound';
            return 'crossing';
        };

        const rendered = []; // {marker, tipHtml, priority}

        traffic.forEach(ac => {
            const dir = classifyDir(ac);
            // inbound to VHHH → yellow, outbound → blue, everything else → white
            const fill = dir === 'inbound'  ? '#ffd84a'
                       : dir === 'outbound' ? '#3b9eff'
                                            : '#ffffff';
            const rot = ac.track || 0;
            const size = ac.onGround ? 20 : 28;

            const svg = `
                <svg width="${size}" height="${size}" viewBox="0 0 24 24" style="transform: rotate(${rot}deg);">
                    <path d="M12 2 L15 10 L22 11 L22 13 L15 14 L14 18 L16 20 L16 22 L12 21 L8 22 L8 20 L10 18 L9 14 L2 13 L2 11 L9 10 Z"
                          fill="${fill}" stroke="#0a0e14" stroke-width="1.2" stroke-linejoin="round"/>
                </svg>
            `;

            const icon = L.divIcon({
                className: `ac-marker ac-${dir}`,
                html: svg,
                iconSize: [size, size],
                iconAnchor: [size/2, size/2]
            });
            const marker = L.marker([ac.lat, ac.lon], { icon, keyboard: false });

            const altStr   = ac.onGround ? 'GND' : (ac.altFt >= 18000 ? `FL${String(Math.round(ac.altFt / 100)).padStart(3, '0')}` : `${Math.round(ac.altFt).toLocaleString()} ft`);
            const vsIcon   = ac.vsFpm > 256 ? '↑' : ac.vsFpm < -256 ? '↓' : '→';
            const trackStr = `${String(Math.round(ac.track)).padStart(3, '0')}°`;
            const gsStr    = `${Math.round(ac.gsKts)} kt`;
            const type     = ac.type || '----';
            const typeRow  = typeMap && ac.type ? typeMap.get(ac.type.toUpperCase()) : null;
            const wtc      = (typeRow && typeRow.config && typeRow.config[0]) || '-';
            const rt       = routes[ac.callsign];
            const orig     = (rt && rt.orig) || '----';
            const dest     = (rt && rt.dest) || '----';
            const cs       = ac.callsign || '—';

            const tipHtml = `
                <div class="ac-tip">
                    <div class="ac-line ac-cs">${cs}</div>
                    <div class="ac-line"><span class="ac-val">${type}</span> <span class="ac-wtc">${wtc}</span> <span class="ac-meta">·</span> <span class="ac-val">${orig}</span><span class="ac-meta">→</span><span class="ac-val">${dest}</span></div>
                    <div class="ac-line"><span class="ac-meta">ALT</span> <span class="ac-val">${altStr}</span> <span class="ac-val">${vsIcon}</span></div>
                    <div class="ac-line"><span class="ac-meta">GS</span> <span class="ac-val">${gsStr}</span> &nbsp;<span class="ac-meta">TRK</span> <span class="ac-val">${trackStr}</span></div>
                </div>
            `;

            // Bind with default N position — declutter below may rebind at another anchor
            marker.bindTooltip(tipHtml, {
                direction: 'top',
                offset: [0, -14],
                className: showAcLabels ? 'ac-tooltip ac-label-pinned' : 'ac-tooltip',
                opacity: 1,
                permanent: showAcLabels
            });
            marker.addTo(lg);

            const priority = dir === 'inbound' ? 0 : dir === 'outbound' ? 1 : dir === 'ground' ? 3 : 2;
            rendered.push({ marker, tipHtml, priority });
        });

        const leaderLg = leaderLgRef.current;
        if (leaderLg) leaderLg.clearLayers();

        // Label declutter — tries 8 anchors (N,NE,E,SE,S,SW,W,NW) per aircraft
        const declutter = () => {
            if (leaderLg) leaderLg.clearLayers();
            if (!showAcLabels) return;
            const labelW = 128, labelH = 62, icon = 28, pad = 6;
            const dx = labelW/2 + icon/2 + pad;  // ~78
            const dy = labelH/2 + icon/2 + pad;  // ~47
            // anchor: { dir, off, ox, oy } where (ox,oy) = label-center offset from marker in px
            const anchors = [
                { dir: 'top',    off: [0,   -(icon/2 + pad)],       ox: 0,   oy: -dy },
                { dir: 'right',  off: [icon/2 + pad,  -labelH/2],   ox: dx,  oy: -dy/2 },
                { dir: 'left',   off: [-(icon/2 + pad), -labelH/2], ox: -dx, oy: -dy/2 },
                { dir: 'right',  off: [icon/2 + pad,   0],          ox: dx,  oy: 0 },
                { dir: 'left',   off: [-(icon/2 + pad), 0],         ox: -dx, oy: 0 },
                { dir: 'right',  off: [icon/2 + pad,  labelH/2],    ox: dx,  oy: dy/2 },
                { dir: 'left',   off: [-(icon/2 + pad), labelH/2],  ox: -dx, oy: dy/2 },
                { dir: 'bottom', off: [0,   icon/2 + pad],          ox: 0,   oy: dy },
            ];

            if (!acLabelsDeclutter) {
                rendered.forEach(({ marker, tipHtml }) => {
                    if (marker.getTooltip()) marker.unbindTooltip();
                    marker.bindTooltip(tipHtml, {
                        direction: 'top', offset: [0, -(icon/2 + pad)],
                        className: 'ac-tooltip ac-label-pinned',
                        opacity: 1, permanent: true
                    });
                    if (leaderLg) {
                        const pt = map.latLngToContainerPoint(marker.getLatLng());
                        const ll1 = map.containerPointToLatLng([pt.x, pt.y - icon/2]);
                        const ll2 = map.containerPointToLatLng([pt.x, pt.y - (icon/2 + pad)]);
                        L.polyline([ll1, ll2], {
                            color: '#e0e6ed', weight: 1, opacity: 0.45,
                            interactive: false, dashArray: '2,3'
                        }).addTo(leaderLg);
                    }
                });
                return;
            }

            const sorted = [...rendered].sort((a, b) => a.priority - b.priority);
            const accepted = [];
            sorted.forEach(({ marker, tipHtml }) => {
                const pt = map.latLngToContainerPoint(marker.getLatLng());
                let placed = false;
                for (const a of anchors) {
                    const cx = pt.x + a.ox, cy = pt.y + a.oy;
                    const rect = { x1: cx - labelW/2, y1: cy - labelH/2, x2: cx + labelW/2, y2: cy + labelH/2 };
                    const hit = accepted.some(r =>
                        !(rect.x2 < r.x1 || rect.x1 > r.x2 || rect.y2 < r.y1 || rect.y1 > r.y2)
                    );
                    if (!hit) {
                        accepted.push(rect);
                        if (marker.getTooltip()) marker.unbindTooltip();
                        marker.bindTooltip(tipHtml, {
                            direction: a.dir, offset: a.off,
                            className: 'ac-tooltip ac-label-pinned',
                            opacity: 1, permanent: true
                        });
                        // Leader line from icon edge to label edge, in container px → latlng
                        if (leaderLg) {
                            const from = pt;
                            const to   = { x: cx, y: cy };
                            // stop short of the label rect so the line doesn't visually overlap
                            const dxL = to.x - from.x, dyL = to.y - from.y;
                            const len = Math.hypot(dxL, dyL) || 1;
                            const iconEdge = icon/2;
                            const labelEdge = 4;
                            const p1 = { x: from.x + dxL * (iconEdge / len), y: from.y + dyL * (iconEdge / len) };
                            const p2 = { x: to.x   - dxL * ((labelW/2 - labelEdge) / len), y: to.y - dyL * ((labelH/2 - labelEdge) / len) };
                            const ll1 = map.containerPointToLatLng([p1.x, p1.y]);
                            const ll2 = map.containerPointToLatLng([p2.x, p2.y]);
                            L.polyline([ll1, ll2], {
                                color: '#e0e6ed', weight: 1, opacity: 0.45,
                                interactive: false, dashArray: '2,3'
                            }).addTo(leaderLg);
                        }
                        placed = true;
                        break;
                    }
                }
                if (!placed && marker.getTooltip()) marker.unbindTooltip();
            });
        };
        declutter();
        map.on('moveend zoomend', declutter);
        return () => { map.off('moveend zoomend', declutter); };
    }, [traffic, liveTraffic, showAcLabels, acLabelsDeclutter, routes, db.fixes, typeMap]);

    // ── Main Map Rendering Logic (Procedures & Declutter) ───────────────────
    useEffect(() => {
        const fg = fgRef.current;
        if (!fg.map) return;

        fg.procLg.clearLayers();
        fg.hlLg.clearLayers();

        const seenLabels = new Set();

        // 1. Draw Airspaces
        if (db.airspaces) {
            db.airspaces.forEach(airspace => {
                let isVisible = false;
                if (airspace.id === 'atz_vhhh' && dispOpts.atz) isVisible = true;
                if (airspace.id === 'ctr_vhhh' && dispOpts.ctr) isVisible = true;
                if (airspace.id === 'tma_vhhh' && dispOpts.tma) isVisible = true;
                if (airspace.id === 'fir_vhhh' && dispOpts.fir) isVisible = true;

                if (!isVisible) return;

                const poly = L.polygon(airspace.coords, {
                    color: airspace.color, weight: 1.5, opacity: 0.6,
                    fillColor: airspace.color, fillOpacity: 0.05,
                    dashArray: '4, 4', interactive: false
                }).addTo(fg.procLg);
                
                const center = poly.getBounds().getCenter();
                const labelIcon = L.divIcon({
                    className: '',
                    html: `<div style="color: ${airspace.color}; opacity: 0.6; font-size: ${textSize}px; font-weight: bold; font-family: 'JetBrains Mono', monospace; text-shadow: 0 0 3px #0d1117;">${airspace.name}</div>`,
                    iconSize: [100, 12], iconAnchor: [50, 6]
                });
                L.marker(center, { icon: labelIcon, interactive: false }).addTo(fg.procLg);
            });
        }

        // 2. Draw Range Rings
        if (dispOpts.ranges) {
            const arp = db.fixes["VHHH"] || [22.3089, 113.9146];
            for (let i = 1; i <= 6; i++) {
                L.circle(arp, {
                    radius: i * 10 * 1852, color: '#6e7681', weight: 1, fill: false,
                    dashArray: '4, 4', opacity: 0.5, interactive: false
                }).addTo(fg.procLg);
                
                const offsetLat = arp[0] + (i * 10 / 60);
                const ringLabelIcon = L.divIcon({
                    className: '',
                    html: `<div style="color: #6e7681; font-size: ${Math.max(8, textSize - 1)}px; font-family: 'JetBrains Mono', monospace; text-shadow: 0 0 3px #0d1117;">${i*10}</div>`,
                    iconSize: [20, 12], iconAnchor: [10, 6]
                });
                L.marker([offsetLat, arp[1]], { icon: ringLabelIcon, interactive: false }).addTo(fg.procLg);
            }
        }

        const getSegments = (waypoints) => {
            const coords = [];
            for (const wp of waypoints) {
                const fixName = typeof wp === 'string' ? wp : wp.fix;
                if (db.fixes[fixName]) coords.push(db.fixes[fixName]);
            }
            return coords;
        };

        // 3. Draw INACTIVE procedures
        const q = searchQuery.trim().toUpperCase();
        db.procedures.forEach(proc => {
            if (activeIds.includes(proc.id)) return;
            if (proc.type === 'SID' && !layers.sids) return;
            if (proc.type === 'STAR' && !layers.stars) return;
            if (proc.type === 'IAC' && !layers.iacs) return;
            if (rwyFilter !== 'ALL' && (!proc.runway || !proc.runway.includes(rwyFilter))) return;

            const coords = getSegments(proc.waypoints);
            if (coords.length < 2) return;

            const procFixes = proc.waypoints.map(w => typeof w === 'string' ? w : w.fix);
            const matchesHighlight = highlightFix && procFixes.includes(highlightFix);
            const matchesSearch = !q || proc.name.toUpperCase().includes(q) || (proc.runway || '').toUpperCase().includes(q) || procFixes.some(f => f.includes(q));
            const dimmed = (highlightFix && !matchesHighlight) || (q && !matchesSearch);
            const emphasized = matchesHighlight || (q && matchesSearch);

            const baseOpacity = dimmed ? 0.08 : (emphasized ? 0.55 : 0.25);
            const baseWeight = emphasized ? 3 : 2;

            L.polyline(coords, { ...STYLES[proc.type], opacity: baseOpacity, weight: baseWeight })
             .bindTooltip(`<div style="font-size: ${textSize}px">${proc.name}</div>`, { sticky: true, className: 'proc-tooltip' })
             .on('mouseover', function() { this.setStyle({ opacity: 0.85, weight: baseWeight + 2 }); })
             .on('mouseout', function() { this.setStyle({ opacity: baseOpacity, weight: baseWeight }); })
             .addTo(fg.procLg);
        });

        // Pulsing highlight marker on the selected fix
        if (highlightFix && db.fixes[highlightFix]) {
            const coord = db.fixes[highlightFix];
            L.circleMarker(coord, {
                radius: 20, color: '#4cd9e6', weight: 2, opacity: 0.85,
                fillColor: '#4cd9e6', fillOpacity: 0.12, interactive: false, dashArray: '3, 4'
            }).addTo(fg.procLg);
            L.circleMarker(coord, {
                radius: 10, color: '#4cd9e6', weight: 2, opacity: 1,
                fillColor: '#4cd9e6', fillOpacity: 0.45, interactive: false
            }).addTo(fg.procLg);
        }

        // DOM Updater for Labels
        const updateCustomLabel = (id, coord, cx, cy, html, lineColor = 'var(--border-bright)', w = 0, h = 0, marker = null, shouldDraw = true) => {
            seenLabels.add(id);
            let cache = labelsCache.current[id];
            const pane = fg.map.getPane('tooltipPane');

            if (!cache) {
                const container = L.DomUtil.create('div', 'custom-label-container', pane);
                
                const svgNs = "http://www.w3.org/2000/svg";
                const svg = document.createElementNS(svgNs, "svg");
                svg.setAttribute('class', 'custom-leader-svg');
                const path = document.createElementNS(svgNs, "path");
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke-dasharray', '2, 3');
                path.setAttribute('stroke-width', '1.5');
                svg.appendChild(path);
                container.appendChild(svg);

                const box = L.DomUtil.create('div', 'custom-label-box', container);
                cache = { container, svg, path, box, marker: null };
                labelsCache.current[id] = cache;
                
                box.addEventListener('mouseenter', () => {
                    box.classList.add('is-hovered');
                    path.classList.add('is-hovered');
                    if (cache.marker && cache.marker.getElement()) {
                        const iconDiv = cache.marker.getElement().querySelector('.wp-marker-outer');
                        if (iconDiv) iconDiv.classList.add('is-hovered');
                    }
                });
                box.addEventListener('mouseleave', () => {
                    box.classList.remove('is-hovered');
                    path.classList.remove('is-hovered');
                    if (cache.marker && cache.marker.getElement()) {
                        const iconDiv = cache.marker.getElement().querySelector('.wp-marker-outer');
                        if (iconDiv) iconDiv.classList.remove('is-hovered');
                    }
                });
            }
            
            cache.marker = marker;

            if (!shouldDraw) {
                cache.box.style.opacity = '0';
                cache.svg.style.opacity = '0';
                cache.box.style.pointerEvents = 'none';
                return;
            }

            cache.box.style.opacity = '1';
            cache.box.style.pointerEvents = 'auto';

            const pt = fg.map.latLngToLayerPoint(coord);
            L.DomUtil.setPosition(cache.container, pt);

            if (cache.box.innerHTML !== html) cache.box.innerHTML = html;
            cache.box.style.transform = `translate(calc(${cx}px - 50%), calc(${cy}px - 50%))`;

            // Calculate endpoint so the line stops at the border of the box instead of the center
            let ex = cx, ey = cy;
            if (w > 0 && h > 0 && (Math.abs(cx) > 0 || Math.abs(cy) > 0)) {
                const paddedW = w + 4; 
                const paddedH = h + 4;
                const tx = Math.abs(cx) > 0 ? (paddedW / 2) / Math.abs(cx) : Infinity;
                const ty = Math.abs(cy) > 0 ? (paddedH / 2) / Math.abs(cy) : Infinity;
                const t = Math.min(tx, ty);
                
                if (t < 1) {
                    ex = cx * (1 - t);
                    ey = cy * (1 - t);
                } else {
                    ex = 0; ey = 0;
                }
            }

            const dStr = `M 0,0 C ${ex * 0.5},0 ${ex * 0.5},${ey} ${ex},${ey}`;
            cache.path.setAttribute('d', dStr);
            cache.path.setAttribute('stroke', lineColor);
            
            const dist = Math.hypot(ex, ey);
            cache.svg.style.opacity = (dispOpts.declutter && dist > 8) ? '0.7' : '0';
        };

        const activeProcs = activeIds.map(id => db.procedures.find(p => p.id === id)).filter(Boolean);

        // 4. Draw ACTIVE procedures
        if (activeProcs.length > 0) {
            const aggWps = {}; 
            const activeSegments = []; 
            const distancesToDraw = []; 
            const pendingLabels = [];

            activeProcs.forEach(proc => {
                const coords = getSegments(proc.waypoints);
                if (coords.length >= 2) {
                    const style = STYLES[proc.type];
                    
                    L.polyline(coords, { ...style, weight: lineSize, opacity: 1 })
                        .bindTooltip(`<div style="font-size: ${textSize}px"><b>${proc.name}</b> ${proc.type}</div>`, { sticky: true, className: 'proc-tooltip' })
                        .on('mouseover', function() { this.setStyle({ weight: lineSize + 4 }); })
                        .on('mouseout', function() { this.setStyle({ weight: lineSize }); })
                        .addTo(fg.hlLg);
                    
                    for (let i = 0; i < coords.length - 1; i++) {
                        activeSegments.push({ procId: proc.id, p1: coords[i], p2: coords[i+1] });
                        distancesToDraw.push({ p1: coords[i], p2: coords[i+1] });
                    }

                    proc.waypoints.forEach(wp => {
                        const fixName = typeof wp === 'string' ? wp : wp.fix;
                        const coord = db.fixes[fixName];
                        if (!coord) return;

                        if (!aggWps[fixName]) aggWps[fixName] = { coord, pt: fg.map.latLngToLayerPoint(coord), color: style.color, constraintHtmls: [] };

                        if (typeof wp === 'object') {
                            const a1 = formatAlt(wp.alt1);
                            const a2 = formatAlt(wp.alt2);
                            const s = formatSpd(wp.spd);

                            let altHtml = '';
                            if (wp.altType === 'AT') altHtml = `<div style="text-decoration: underline overline;">${a1}</div>`;
                            else if (wp.altType === 'ABOVE') altHtml = `<div style="text-decoration: underline;">${a1}</div>`;
                            else if (wp.altType === 'BELOW') altHtml = `<div style="text-decoration: overline;">${a1}</div>`;
                            else if (wp.altType === 'WINDOW') altHtml = `<div style="display:flex; flex-direction:column; align-items:center; line-height:1.1;"><span style="text-decoration: overline;">${a2}</span><span style="text-decoration: underline;">${a1}</span></div>`;

                            let spdHtml = '';
                            if (wp.spdType === 'AT') spdHtml = `SPD ${s}`;
                            else if (wp.spdType === 'MAX') spdHtml = `MAX ${s}`;
                            else if (wp.spdType === 'MIN') spdHtml = `MIN ${s}`;
                            if(spdHtml) spdHtml = `<div style="margin-top:2px;">${spdHtml}</div>`;

                            if (altHtml || spdHtml) {
                                aggWps[fixName].constraintHtmls.push({
                                    procName: proc.name,
                                    html: `<div style="display:flex; flex-direction:column; align-items:center; color:var(--text-primary);">${altHtml}${spdHtml}</div>`
                                });
                            }
                        }
                    });
                }
            });

            const activeSegmentsPx = activeSegments.map(seg => ({
                p1: fg.map.latLngToLayerPoint(seg.p1),
                p2: fg.map.latLngToLayerPoint(seg.p2)
            }));

            // BUILD LABEL DATA
            Object.keys(aggWps).forEach(fixName => {
                const wpData = aggWps[fixName];
                const pt = wpData.pt;
                
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14">
                    <polygon points="7,1 13,13 1,13" fill="${wpData.color}" fill-opacity="0.9" stroke="#0d1117" stroke-width="1.5"/>
                </svg>`;
                const icon = L.divIcon({ className: '', html: `<div class="wp-marker-outer">${svg}</div>`, iconSize: [14,14], iconAnchor: [7,7] });
                const marker = L.marker(wpData.coord, { icon });
                
                let tooltipHtml = '';
                let blockCount = 0;
                let maxChars = fixName.length;

                const showLabels = dispOpts.labels;
                const showConstraints = dispOpts.constraints && wpData.constraintHtmls.length > 0;

                if (showLabels || showConstraints) {
                    tooltipHtml += `<div style="font-size: ${textSize}px; line-height: 1.2; display: flex; flex-direction: column; align-items: center;">`;
                    if (showLabels) tooltipHtml += `<b style="color:${wpData.color}">${fixName}</b>`;
                    
                    if (showConstraints) {
                        const grouped = {};
                        wpData.constraintHtmls.forEach(item => {
                            if (!grouped[item.html]) grouped[item.html] = [];
                            if (!grouped[item.html].includes(item.procName)) grouped[item.html].push(item.procName);
                        });

                        blockCount = Object.keys(grouped).length;
                        const borderStyle = showLabels ? `margin-top: 4px; border-top: 1px solid var(--border-bright); padding-top: 4px; width: 100%; display: flex; flex-direction: column; align-items: center;` : `display: flex; flex-direction: column; align-items: center; width: 100%;`;
                        
                        tooltipHtml += `<div style="${borderStyle}">`;
                        const blocks = Object.keys(grouped).map(html => {
                            const procs = grouped[html].join(', ');
                            const strippedHtml = html.replace(/<[^>]*>?/gm, '');
                            maxChars = Math.max(maxChars, procs.length, strippedHtml.length);

                            if (activeProcs.length > 1) {
                                return `<div style="font-size: ${Math.max(8, textSize - 2)}px; color: #8b949e; padding-bottom: 2px; text-align: center;">${procs}</div>${html}`;
                            } else {
                                return `${html}`;
                            }
                        });

                        tooltipHtml += blocks.join('<div style="height:1px; width: 100%; margin: 4px 0; background: var(--border-bright);"></div>');
                        tooltipHtml += `</div>`;
                    }
                    tooltipHtml += `</div>`;
                }

                const id = `wp_${fixName}`;
                const weight = wpData.constraintHtmls.length;

                let nativeHoverHtml = `<div style="text-align:center"><b style="color:${wpData.color}">${fixName}</b></div>`;
                if (wpData.constraintHtmls.length > 0) {
                    const uniqueH = [...new Set(wpData.constraintHtmls.map(i => i.html))];
                    nativeHoverHtml += `<div style="margin-top: 4px; border-top: 1px solid var(--border-bright); padding-top: 4px;">${uniqueH.join('<div style="height:4px"></div>')}</div>`;
                }
                
                marker.on('mouseover', () => {
                    if (labelsCache.current[id]) {
                        labelsCache.current[id].box.classList.add('is-hovered');
                        labelsCache.current[id].path.classList.add('is-hovered');
                    }
                });
                marker.on('mouseout', () => {
                    if (labelsCache.current[id]) {
                        labelsCache.current[id].box.classList.remove('is-hovered');
                        labelsCache.current[id].path.classList.remove('is-hovered');
                    }
                });
                marker.addTo(fg.hlLg);

                if (tooltipHtml) {
                    // Amped up height/width estimates so collision engine never overlaps them
                    const linesPerBlock = activeProcs.length > 1 ? 3.5 : 2.5;
                    const w = maxChars * (textSize * 0.7) + 24;
                    const h = (showLabels ? textSize * 1.5 : 0) + (blockCount * (textSize * linesPerBlock + 12)) + 16;

                    pendingLabels.push({
                        id, coord: wpData.coord, pt, w, h,
                        html: tooltipHtml, color: wpData.color, marker,
                        weight, nativeHoverHtml
                    });
                } else {
                    marker.bindTooltip(nativeHoverHtml, { direction: 'top', offset: [0, -8], className: 'wp-hover-tooltip' });
                }
            });

            // DETERMINISTIC RADIAL SEARCH ENGINE (Greedy Placement)
            const placedBoxes = [];
            
            // Sort: Heaviest labels (most constraints) get placed first.
            pendingLabels.sort((a, b) => b.weight - a.weight);

            // Search vectors (16 angles for precise filling)
            const searchAngles = [
                -Math.PI/4, Math.PI/4, -3*Math.PI/4, 3*Math.PI/4,
                0, -Math.PI/2, Math.PI/2, Math.PI,
                -Math.PI/8, Math.PI/8, -3*Math.PI/8, 3*Math.PI/8,
                -5*Math.PI/8, 5*Math.PI/8, -7*Math.PI/8, 7*Math.PI/8
            ];

            for (let l of pendingLabels) {
                if (!dispOpts.declutter) {
                    l.cx = 20 + l.w/2;
                    l.cy = 0;
                    l.shouldDraw = true;
                    continue;
                }

                let bestPos = null;
                const minRadii = 15; 
                const maxRadii = l.weight > 0 ? 180 : 80; 
                const step = 15;

                for (let r = minRadii; r <= maxRadii && !bestPos; r += step) {
                    for (let angle of searchAngles) {
                        let cx = r * Math.cos(angle);
                        let cy = r * Math.sin(angle);

                        // Push center of box out so edge touches radius
                        if (Math.abs(Math.cos(angle)) > 0.1) cx += Math.sign(Math.cos(angle)) * (l.w/2);
                        if (Math.abs(Math.sin(angle)) > 0.1) cy += Math.sign(Math.sin(angle)) * (l.h/2);

                        const box = {
                            l: l.pt.x + cx - l.w/2,
                            r: l.pt.x + cx + l.w/2,
                            t: l.pt.y + cy - l.h/2,
                            b: l.pt.y + cy + l.h/2
                        };

                        let collision = false;
                        const pad = 4;

                        // Check 1: Other placed boxes
                        for (let pb of placedBoxes) {
                            if (!(box.r + pad < pb.l || box.l - pad > pb.r || box.b + pad < pb.t || box.t - pad > pb.b)) {
                                collision = true; break;
                            }
                        }
                        if (collision) continue;

                        // Check 2: Waypoint markers (so we don't cover a triangle)
                        const wpPad = 14;
                        for (let wpId in aggWps) {
                            const wpPt = aggWps[wpId].pt;
                            if (wpPt.x > box.l - wpPad && wpPt.x < box.r + wpPad && wpPt.y > box.t - wpPad && wpPt.y < box.b + wpPad) {
                                collision = true; break;
                            }
                        }
                        if (collision) continue;

                        // Check 3: Flight path lines
                        for (let seg of activeSegmentsPx) {
                            if (lineIntersectsBox(seg.p1, seg.p2, box, 4)) {
                                collision = true; break;
                            }
                        }
                        if (collision) continue;

                        bestPos = { cx, cy, box };
                        break; 
                    }
                }

                if (bestPos) {
                    l.cx = bestPos.cx;
                    l.cy = bestPos.cy;
                    l.shouldDraw = true;
                    placedBoxes.push(bestPos.box);
                } else {
                    l.shouldDraw = false; 
                }
            }

            // Commit calculated positions to DOM
            pendingLabels.forEach(l => {
                updateCustomLabel(l.id, l.coord, l.cx, l.cy, l.html, l.color, l.w, l.h, l.marker, l.shouldDraw);
                
                if (l.shouldDraw) {
                    if (l.marker.getTooltip()) l.marker.unbindTooltip();
                } else {
                    if (l.marker.getTooltip()) {
                        l.marker.setTooltipContent(l.nativeHoverHtml);
                    } else {
                        l.marker.bindTooltip(l.nativeHoverHtml, { direction: 'top', offset: [0, -8], className: 'wp-hover-tooltip' });
                    }
                }
            });

            // Draw Distances statically (Distance markers stay perfectly centered on path)
            if (dispOpts.distances) {
                const drawnSegments = new Set();
                distancesToDraw.forEach(seg => {
                    const p1 = L.latLng(seg.p1);
                    const p2 = L.latLng(seg.p2);
                    
                    const segKey = `${seg.p1[0]},${seg.p1[1]}-${seg.p2[0]},${seg.p2[1]}`;
                    const segKeyRev = `${seg.p2[0]},${seg.p2[1]}-${seg.p1[0]},${seg.p1[1]}`;
                    if (drawnSegments.has(segKey) || drawnSegments.has(segKeyRev)) return;
                    drawnSegments.add(segKey);
                    
                    const distMeters = p1.distanceTo(p2);
                    const distNM = (distMeters / 1852).toFixed(1);
                    const midLat = (p1.lat + p2.lat) / 2;
                    const midLng = (p1.lng + p2.lng) / 2;

                    const distIcon = L.divIcon({
                        className: 'dist-label',
                        html: `<div class="dist-label-inner">${distNM} NM</div>`,
                        iconSize: [0, 0] 
                    });

                    L.marker([midLat, midLng], { icon: distIcon, interactive: false }).addTo(fg.hlLg);
                });
            }

            // Draw Conflicts (subtle, no text)
            const intersections = [];
            for (let i = 0; i < activeSegments.length; i++) {
                for (let j = i + 1; j < activeSegments.length; j++) {
                    if (activeSegments[i].procId === activeSegments[j].procId) continue; 
                    const pt = getIntersection(activeSegments[i].p1, activeSegments[i].p2, activeSegments[j].p1, activeSegments[j].p2);
                    if (pt) {
                        const isDup = intersections.some(existing => Math.abs(existing[0] - pt[0]) < 0.0001 && Math.abs(existing[1] - pt[1]) < 0.0001);
                        if (!isDup) intersections.push(pt);
                    }
                }
            }

            intersections.forEach(pt => {
                L.circleMarker(pt, { radius: 12, color: '#ff5c68', weight: 1, opacity: 0.5, fillColor: '#ff5c68', fillOpacity: 0.15, dashArray: '3, 4', interactive: false })
                    .addTo(fg.hlLg);
            });
        }

        // Cleanup unused animated labels
        Object.keys(labelsCache.current).forEach(id => {
            if (!seenLabels.has(id)) {
                labelsCache.current[id].container.remove();
                delete labelsCache.current[id];
            }
        });

    }, [db, activeIds, layers, dispOpts, textSize, lineSize, rwyFilter, zoomTrigger, searchQuery, highlightFix]);

    useEffect(() => {
        const fixNames = Object.keys(db.fixes);
        if (fixNames.length > 0 && !selectedWpToAdd) {
            setSelectedWpToAdd(fixNames[0]);
        }
    }, [db.fixes]);

    const handleSaveDB = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "aeroproc_database.json");
        dlAnchorElem.click();
    };

    const handleLoadDB = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const loaded = JSON.parse(e.target.result);
                if (loaded.fixes && loaded.procedures) {
                    if (!loaded.airspaces) loaded.airspaces = [];
                    setDb(loaded);
                    setActiveIds([]);
                    const keys = Object.keys(loaded.fixes);
                    if(keys.length > 0 && fgRef.current.map) {
                        fgRef.current.map.setView(loaded.fixes[keys[0]], 10);
                    }
                } else {
                    alert("Invalid Database Format!");
                }
            } catch (err) {
                alert("Error reading JSON file.");
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    };

    const handleAddFix = () => {
        setFixError('');
        if (!newFixName.trim() || !newFixLat.trim() || !newFixLon.trim()) return setFixError('All fields are required.');

        const lat = parseCoordinate(newFixLat, true);
        const lon = parseCoordinate(newFixLon, false);

        if (isNaN(lat) || lat < -90 || lat > 90) return setFixError('Invalid Latitude format. Use decimals (-23.5) or DMS (22 20 09.10N).');
        if (isNaN(lon) || lon < -180 || lon > 180) return setFixError('Invalid Longitude format. Use decimals (-46.5) or DMS (114 01 16.30E).');

        const name = newFixName.toUpperCase().trim();
        if (!/^[A-Z0-9]+$/.test(name)) return setFixError('Fix name must be alphanumeric.');

        setDb(prev => ({ ...prev, fixes: { ...prev.fixes, [name]: [lat, lon] } }));
        setNewFixName(''); setNewFixLat(''); setNewFixLon('');
    };

    const handleDeleteFix = (name) => {
        setDb(prev => {
            const newFixes = { ...prev.fixes };
            delete newFixes[name];
            return { ...prev, fixes: newFixes };
        });
    };

    const handleAddWpToProc = () => {
        if (selectedWpToAdd) {
            const newWp = { fix: selectedWpToAdd, altType: wpAltType, alt1: wpAlt1, alt2: wpAlt2, spdType: wpSpdType, spd: wpSpd };
            setNewProcWpts([...newProcWpts, newWp]);
            setWpAltType('NONE'); setWpAlt1(''); setWpAlt2(''); setWpSpdType('NONE'); setWpSpd('');
        }
    };

    const handleRemoveWpFromProc = (idx) => {
        setNewProcWpts(newProcWpts.filter((_, i) => i !== idx));
    };

    const handleSaveProcedure = () => {
        if (!newProcName || newProcWpts.length < 2) return;
        const newProc = { id: `proc_${Date.now()}`, name: newProcName.toUpperCase().trim(), type: newProcType, runway: newProcRwy.toUpperCase().trim(), waypoints: [...newProcWpts] };
        setDb(prev => ({ ...prev, procedures: [...prev.procedures, newProc] }));
        setNewProcName(''); setNewProcRwy(''); setNewProcWpts([]);
    };

    const handleDeleteProcedure = (id) => {
        setDb(prev => ({ ...prev, procedures: prev.procedures.filter(p => p.id !== id) }));
        setActiveIds(prev => prev.filter(activeId => activeId !== id));
    };

    const filterByRunway = (p) => {
        if (rwyFilter === 'ALL') return true;
        if (!p.runway) return false;
        return p.runway.includes(rwyFilter);
    };

    const q = searchQuery.trim().toUpperCase();
    const procMatches = (p) => {
        if (!q) return true;
        const fixes = p.waypoints.map(w => typeof w === 'string' ? w : w.fix).join(' ');
        return p.name.toUpperCase().includes(q) || (p.runway || '').toUpperCase().includes(q) || fixes.toUpperCase().includes(q);
    };
    const procContainsHighlight = (p) => {
        if (!highlightFix) return true;
        return p.waypoints.some(w => (typeof w === 'string' ? w : w.fix) === highlightFix);
    };

    const sids  = db.procedures.filter(p => p.type === 'SID'  && filterByRunway(p) && procMatches(p) && procContainsHighlight(p));
    const stars = db.procedures.filter(p => p.type === 'STAR' && filterByRunway(p) && procMatches(p) && procContainsHighlight(p));
    const iacs  = db.procedures.filter(p => p.type === 'IAC'  && filterByRunway(p) && procMatches(p) && procContainsHighlight(p));

    const activeProcs = activeIds.map(id => db.procedures.find(p => p.id === id)).filter(Boolean);

    // Aggregate stats for active procedures
    const activeStats = React.useMemo(() => {
        if (activeProcs.length === 0) return null;
        let totalDist = 0;
        const fixSet = new Set();
        const segKeys = new Set();
        activeProcs.forEach(proc => {
            proc.waypoints.forEach(wp => {
                const fixName = typeof wp === 'string' ? wp : wp.fix;
                fixSet.add(fixName);
            });
            for (let i = 0; i < proc.waypoints.length - 1; i++) {
                const f1 = typeof proc.waypoints[i] === 'string' ? proc.waypoints[i] : proc.waypoints[i].fix;
                const f2 = typeof proc.waypoints[i+1] === 'string' ? proc.waypoints[i+1] : proc.waypoints[i+1].fix;
                const key = [f1, f2].sort().join('-');
                if (segKeys.has(key)) continue;
                segKeys.add(key);
                const c1 = db.fixes[f1], c2 = db.fixes[f2];
                if (c1 && c2) {
                    totalDist += L.latLng(c1).distanceTo(L.latLng(c2)) / 1852;
                }
            }
        });
        // Count conflict intersections between different active procs
        let conflicts = 0;
        const segs = [];
        activeProcs.forEach(proc => {
            for (let i = 0; i < proc.waypoints.length - 1; i++) {
                const f1 = typeof proc.waypoints[i] === 'string' ? proc.waypoints[i] : proc.waypoints[i].fix;
                const f2 = typeof proc.waypoints[i+1] === 'string' ? proc.waypoints[i+1] : proc.waypoints[i+1].fix;
                const c1 = db.fixes[f1], c2 = db.fixes[f2];
                if (c1 && c2) segs.push({ procId: proc.id, p1: c1, p2: c2 });
            }
        });
        const seenConf = new Set();
        for (let i = 0; i < segs.length; i++) {
            for (let j = i + 1; j < segs.length; j++) {
                if (segs[i].procId === segs[j].procId) continue;
                const pt = getIntersection(segs[i].p1, segs[i].p2, segs[j].p1, segs[j].p2);
                if (pt) {
                    const k = `${pt[0].toFixed(3)},${pt[1].toFixed(3)}`;
                    if (!seenConf.has(k)) { seenConf.add(k); conflicts++; }
                }
            }
        }
        return {
            fixes: fixSet.size,
            distance: totalDist.toFixed(0),
            conflicts
        };
    }, [activeProcs, db.fixes]);

    // Training quiz helpers
    const startQuiz = React.useCallback(() => {
        const pool = db.procedures;
        if (pool.length < 2) return;
        const pick = pool[Math.floor(Math.random() * pool.length)];
        if (trainingMode === 'identify') {
            // Show the fix sequence, user picks the procedure name
            const distractors = pool.filter(p => p.id !== pick.id && p.type === pick.type);
            const shuffled = distractors.sort(() => Math.random() - 0.5).slice(0, 3);
            const choices = [...shuffled, pick].sort(() => Math.random() - 0.5);
            setQuizProc(pick);
            setQuizChoices(choices);
            setQuizAnswer(null);
        } else {
            // sequence mode: show the name, user picks fix order
            setQuizProc(pick);
            setSeqGuess([]);
            setSeqRevealed(false);
        }
    }, [db.procedures, trainingMode]);

    useEffect(() => {
        if (tab === 'train' && !quizProc) startQuiz();
    }, [tab, quizProc, startQuiz]);

    const answerQuiz = (choiceId) => {
        if (quizAnswer) return;
        const correct = choiceId === quizProc.id;
        setQuizAnswer({ choiceId, correct });
        setQuizScore(s => correct ? { ...s, right: s.right + 1 } : { ...s, wrong: s.wrong + 1 });
    };

    const applyPreset = (preset) => {
        setHighlightFix('');
        setSearchQuery('');
        const filter = (fn) => db.procedures.filter(fn).map(p => p.id);
        if (preset === 'ALL_07_ARR') setActiveIds(filter(p => (p.type === 'STAR' || p.type === 'IAC') && p.runway && p.runway.includes('07')));
        else if (preset === 'ALL_25_ARR') setActiveIds(filter(p => (p.type === 'STAR' || p.type === 'IAC') && p.runway && p.runway.includes('25')));
        else if (preset === 'ALL_07_DEP') setActiveIds(filter(p => p.type === 'SID' && p.runway && p.runway.includes('07')));
        else if (preset === 'ALL_25_DEP') setActiveIds(filter(p => p.type === 'SID' && p.runway && p.runway.includes('25')));
        else if (preset === 'CLEAR') setActiveIds([]);
    };

    const handleProcClick = (id) => {
        setActiveIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
    };

    const renderProcButton = (p, typeClass) => {
        const isActive = activeIds.includes(p.id);
        const procFixes = p.waypoints.map(w => typeof w === 'string' ? w : w.fix);
        const isHighlighted = highlightFix && procFixes.includes(highlightFix);
        return (
            <button
                key={p.id}
                className={`proc-btn ${typeClass} ${isActive ? 'active ' + typeClass : ''} ${isHighlighted && !isActive ? 'match' : ''}`}
                onClick={() => handleProcClick(p.id)}
            >
                <span className="proc-btn-name">{p.name} {p.runway ? <span style={{color:'var(--text-muted)', fontSize:'0.9em'}}>({p.runway})</span> : ''}</span>
                <span className="proc-btn-type">{p.waypoints.length} fixes{isHighlighted ? ' · uses ' + highlightFix : ''}</span>
                <div className="proc-btn-indicator"></div>
            </button>
        );
    };

    return (
        <div style={{ display:'flex', width:'100%', height:'100%', position:'relative' }}>
            {isMobile && sidebarOpen && <div className="sidebar-backdrop visible" onClick={() => setSidebarOpen(false)} />}
            <div className={`sidebar ${sidebarOpen ? '' : 'closed'}`}>
                <div className="sidebar-header">
                    <div className="header-brand">
                        <div className="header-logo">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                        </div>
                        <div>
                            <div className="header-title">AeroProc</div>
                            <div className="header-sub">VHHH · ATCO SIM PREP</div>
                        </div>
                    </div>
                    <button className="header-close-btn" onClick={() => setSidebarOpen(false)} title="Close">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>

                <div className="tabs">
                    <button className={`tab-btn ${tab==='view'?'active':''}`} onClick={() => setTab('view')}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        View
                    </button>
                    <button className={`tab-btn ${tab==='train'?'active':''}`} onClick={() => setTab('train')}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                        Train
                    </button>
                    <button className={`tab-btn ${tab==='edit'?'active':''}`} onClick={() => setTab('edit')}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        Build

                <div className="settings-wrap">
                    <div className="settings-head" onClick={() => setShowSettings(s => !s)}>
                        <span>Display Settings</span>
                        <svg className={`section-chevron ${showSettings ? '' : 'collapsed'}`} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    {showSettings && (
                        <div className="settings-body">
                            <div className="disp-settings-row">
                                <div style={{display:'flex', flex:1, alignItems:'center', paddingRight:'8px', borderRight:'1px solid var(--border)'}}>
                                    <span style={{fontSize: '9px', fontWeight: 'bold', color: 'var(--text-muted)', width:'30px'}}>TEXT</span>
                                    <input className="size-slider" type="range" min="8" max="16" value={textSize} onChange={e => setTextSize(parseInt(e.target.value))} />
                                </div>
                                <div style={{display:'flex', flex:1, alignItems:'center', paddingLeft:'8px'}}>
                                    <span style={{fontSize: '9px', fontWeight: 'bold', color: 'var(--text-muted)', width:'30px'}}>LINE</span>
                                    <input className="size-slider" type="range" min="2" max="10" value={lineSize} onChange={e => setLineSize(parseInt(e.target.value))} />

                                <button className={`toggle-btn ${dispOpts.declutter ? 'active iac-style' : ''}`} onClick={() => setDispOpts(p => ({...p, declutter: !p.declutter}))}>DECLUTTER</button>
                            </div>
                            <div className="disp-settings-row">
                                <button className={`toggle-btn ${dispOpts.ranges ? 'active' : ''}`} onClick={() => setDispOpts(p => ({...p, ranges: !p.ranges}))}>10NM RINGS</button>
                                <button className={`toggle-btn ${dispOpts.atz ? 'active' : ''}`} onClick={() => setDispOpts(p => ({...p, atz: !p.atz}))}>ATZ</button>
                                <button className={`toggle-btn ${dispOpts.ctr ? 'active' : ''}`} onClick={() => setDispOpts(p => ({...p, ctr: !p.ctr}))}>CTR</button>
                                <button className={`toggle-btn ${dispOpts.tma ? 'active' : ''}`} onClick={() => setDispOpts(p => ({...p, tma: !p.tma}))}>TMA</button>
                                <button className={`toggle-btn ${dispOpts.fir ? 'active' : ''}`} onClick={() => setDispOpts(p => ({...p, fir: !p.fir}))}>FIR</button>
                            </div>
                            <div className="disp-settings-row">
                                <button className={`toggle-btn ${liveTraffic ? 'active star-style' : ''}`} onClick={() => setLiveTraffic(v => !v)} style={{flex: 1}}>
                                    {liveTraffic ? '● LIVE TRAFFIC ON' : '○ LIVE TRAFFIC'}
                                </button>
                            </div>
                            {liveTraffic && (
                                <div className="disp-settings-row">
                                    <button className={`toggle-btn ${showAcLabels ? 'active' : ''}`} onClick={() => setShowAcLabels(v => !v)} style={{flex: 1}}>
                                        {showAcLabels ? '● AC LABELS ON' : '○ AC LABELS'}
                                    </button>
                                    {showAcLabels && (
                                        <button className={`toggle-btn ${acLabelsDeclutter ? 'active' : ''}`} onClick={() => setAcLabelsDeclutter(v => !v)} style={{flex: 1}}
                                            title="Hide aircraft labels that overlap each other (markers stay visible)">
                                            {acLabelsDeclutter ? '◎ DECLUTTER' : '○ DECLUTTER'}
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>

                <div className="sidebar-body">
                    <div className="db-controls">
                        <input type="file" accept=".json" style={{display:'none'}} ref={fileInputRef} onChange={handleLoadDB} />
                        <button className="btn-action" onClick={() => fileInputRef.current.click()}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            Load
                        </button>
                        <button className="btn-action" onClick={handleSaveDB}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 16 12 21 17 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line></svg>
                            Save
                        </button>
                    </div>

                    {tab === 'view' && (
                        <>
                            {/* Live traffic status */}
                            {liveTraffic && (
                                <div className={`traffic-status ${trafficStatus.state === 'err' ? 'err' : ''}`}>
                                    <span className="traffic-dot"></span>
                                    {trafficStatus.state === 'err' ? (
                                        <span style={{flex:1, whiteSpace:'normal', lineHeight: 1.35}}>
                                            <b>Traffic feed error.</b> {trafficStatus.message}
                                        </span>
                                    ) : (
                                        <>
                                            <span>LIVE · {trafficStatus.source || '…'}</span>
                                            <span className="traffic-count">{traffic.length} ac</span>
                                        </>
                                    )}
                                </div>
                            )}

                            {/* Search bar */}
                            <div className="search-bar">
                                <svg className="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                <input className="search-input" placeholder="Search proc / rwy / fix…" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                {searchQuery && <button className="search-clear" onClick={() => setSearchQuery('')}>×</button>}
                            </div>

                            {/* Highlight Fix */}
                            <div>
                                <div className="form-label">Highlight Fix on Map</div>
                                <select className="form-input" value={highlightFix} onChange={e => setHighlightFix(e.target.value)}>
                                    <option value="">— None —</option>
                                    {Object.keys(db.fixes).sort().map(f => <option key={f} value={f}>{f}</option>)}
                                </select>
                                {highlightFix && (
                                    <div className="highlight-banner" style={{marginTop: 6}}>
                                        <span className="banner-label">PULSING:</span>
                                        <span className="banner-value">{highlightFix}</span>
                                        <span style={{color:'var(--text-muted)'}}>· filters list</span>
                                        <button className="banner-x" onClick={() => setHighlightFix('')}>×</button>
                                    </div>
                                )}
                            </div>

                            {/* Runway filter */}
                            <div>
                                <div className="form-label">Runway Filter</div>
                                <div className="filter-chips">
                                    {['ALL','07','07L','07C','07R','25','25L','25R'].map(rwy => (
                                        <button key={rwy} className={`chip ${rwyFilter === rwy ? 'active' : ''}`} onClick={() => setRwyFilter(rwy)}>{rwy}</button>
                                    ))}
                                </div>
                            </div>

                            {/* Quick presets */}
                            <div>
                                <div className="form-label">Quick Load</div>
                                <div className="filter-chips">
                                    <button className="chip accent" onClick={() => applyPreset('ALL_07_ARR')}>07 ARR</button>
                                    <button className="chip accent" onClick={() => applyPreset('ALL_07_DEP')}>07 DEP</button>
                                    <button className="chip accent" onClick={() => applyPreset('ALL_25_ARR')}>25 ARR</button>
                                    <button className="chip accent" onClick={() => applyPreset('ALL_25_DEP')}>25 DEP</button>
                                    <button className="chip" onClick={() => applyPreset('CLEAR')} style={{color: 'var(--accent-red)', borderColor: 'rgba(255,92,104,0.35)'}}>CLEAR</button>
                                </div>
                            </div>

                            {/* Stats card for active procs */}
                            {activeStats && (
                                <div className="stats-card">
                                    <div className="stat-cell">
                                        <div className="stat-val">{activeProcs.length}</div>
                                        <div className="stat-key">Active</div>
                                    </div>
                                    <div className="stat-cell">
                                        <div className="stat-val">{activeStats.fixes}</div>
                                        <div className="stat-key">Fixes</div>
                                    </div>
                                    <div className={`stat-cell ${activeStats.conflicts > 0 ? 'danger' : ''}`}>
                                        <div className="stat-val">{activeStats.conflicts}</div>
                                        <div className="stat-key">Crossings</div>
                                    </div>
                                </div>
                            )}

                            {/* SIDs */}
                            <div>
                                <div className="section-header" onClick={() => setCollapsedSections(s => ({...s, sids: !s.sids}))}>
                                    <div className="section-label sids"><div className="section-dot"></div> Departures (SIDs) <span className="section-count">· {sids.length}</span></div>
                                    <svg className={`section-chevron ${collapsedSections.sids ? 'collapsed' : ''}`} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                                </div>
                                {!collapsedSections.sids && (
                                    <div className="proc-grid">
                                        {sids.length === 0 ? <div className="empty-msg">No SIDs match filters</div> : sids.map(p => renderProcButton(p, 'sid'))}
                                    </div>
                                )}
                            </div>

                            {/* STARs */}
                            <div>
                                <div className="section-header" onClick={() => setCollapsedSections(s => ({...s, stars: !s.stars}))}>
                                    <div className="section-label stars"><div className="section-dot"></div> Arrivals (STARs) <span className="section-count">· {stars.length}</span></div>
                                    <svg className={`section-chevron ${collapsedSections.stars ? 'collapsed' : ''}`} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                                </div>
                                {!collapsedSections.stars && (
                                    <div className="proc-grid">
                                        {stars.length === 0 ? <div className="empty-msg">No STARs match filters</div> : stars.map(p => renderProcButton(p, 'star'))}
                                    </div>
                                )}
                            </div>

                            {/* IACs */}
                            <div>
                                <div className="section-header" onClick={() => setCollapsedSections(s => ({...s, iacs: !s.iacs}))}>
                                    <div className="section-label iacs"><div className="section-dot"></div> Approaches (IACs) <span className="section-count">· {iacs.length}</span></div>
                                    <svg className={`section-chevron ${collapsedSections.iacs ? 'collapsed' : ''}`} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                                </div>
                                {!collapsedSections.iacs && (
                                    <div className="proc-grid">
                                        {iacs.length === 0 ? <div className="empty-msg">No IACs match filters</div> : iacs.map(p => renderProcButton(p, 'iac'))}
                                    </div>
                                )}
                            </div>

                            {/* Active Detail Panel */}
                            {activeProcs.length > 0 && (
                                <div className="detail-panel" style={{display:'flex', flexDirection:'column', gap:'10px', maxHeight:'44vh', overflowY:'auto'}}>
                                    <div className="detail-title" style={{display:'flex', justifyContent:'space-between', marginBottom: 0}}>
                                        <span>Active ({activeProcs.length})</span>
                                        <span style={{cursor:'pointer', color:'var(--accent-red)'}} onClick={()=>setActiveIds([])}>CLEAR ALL</span>
                                    </div>
                                    {activeProcs.map(proc => (
                                        <div key={proc.id} style={{borderTop:'1px solid var(--border)', paddingTop:'8px'}}>

                    {tab === 'train' && (
                        <>
                            <div className="training-mode-toggle">

                                <button
                                    className={`toggle-btn ${trainingMode === 'sequence' ? 'active' : ''}`}
                                    onClick={() => { setTrainingMode('sequence'); setQuizProc(null); setSeqRevealed(false); }}
