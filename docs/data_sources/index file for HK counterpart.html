                            </div>

                            <div className="training-stat-row">
                                <span style={{color:'var(--text-muted)'}}>SESSION</span>
                                <div style={{display:'flex', gap:'10px'}}>
                                    <span className="training-score">✓ {quizScore.right}</span>
                                    <span className="training-miss">✕ {quizScore.wrong}</span>
                                    <button className="item-del" style={{fontSize:'10px'}} onClick={() => setQuizScore({right:0, wrong:0})}>RESET</button>
                                </div>
                            </div>

                            {trainingMode === 'identify' && quizProc && (
                                <div className="training-card">
                                    <div style={{fontSize:'10px', color:'var(--text-muted)', fontFamily:"'JetBrains Mono', monospace", textTransform:'uppercase', letterSpacing:'0.08em'}}>
                                        Which {quizProc.type} uses this sequence?
                                    </div>
                                    <div className="training-prompt">
                                        {quizProc.waypoints.map(w => typeof w === 'string' ? w : w.fix).join(' → ')}
                                        {quizProc.runway && <span className="proc-badge">RWY {quizProc.runway}</span>}
                                    </div>
                                    <div className="training-options">
                                        {quizChoices.map(c => {
                                            let cls = 'training-option';
                                            if (quizAnswer) {
                                                if (c.id === quizProc.id) cls += ' correct';
                                                else if (c.id === quizAnswer.choiceId) cls += ' wrong';
                                                else cls += ' revealed';
                                            }
                                            return (
                                                <button key={c.id} className={cls} onClick={() => answerQuiz(c.id)}>
                                                    {c.name}
                                                    <div style={{fontSize:'9px', color:'var(--text-muted)', marginTop:'3px'}}>RWY {c.runway}</div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <button className="add-btn" onClick={() => { setQuizProc(null); startQuiz(); }}>
                                        {quizAnswer ? 'Next Question →' : 'Skip / New →'}
                                    </button>
                                </div>
                            )}

                            {trainingMode === 'sequence' && quizProc && (() => {
                                const correctFixes = quizProc.waypoints.map(w => typeof w === 'string' ? w : w.fix);
                                const remaining = correctFixes.filter((f, i) => !seqGuess.some((g, gi) => gi === i));
                                const nextCorrect = correctFixes[seqGuess.length];
                                const complete = seqGuess.length === correctFixes.length;
                                const correctCount = seqGuess.filter((g, i) => g === correctFixes[i]).length;
                                return (
                                    <div className="training-card">
                                        <div style={{fontSize:'10px', color:'var(--text-muted)', fontFamily:"'JetBrains Mono', monospace", textTransform:'uppercase', letterSpacing:'0.08em'}}>
                                            Recall fix sequence for:
                                        </div>
                                        <div className="training-prompt">
                                            {quizProc.name}
                                            {quizProc.runway && <span className="proc-badge">RWY {quizProc.runway}</span>}
                                        </div>
                                        <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:'11px', minHeight: '30px', padding: '8px', background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'6px', color: 'var(--text-primary)', wordBreak:'break-word'}}>
                                            {seqGuess.length === 0 ? <span style={{color:'var(--text-muted)'}}>Tap fixes in order…</span> :
                                              seqGuess.map((g, i) => (
                                                <span key={i} style={{color: seqRevealed ? (g === correctFixes[i] ? 'var(--color-iac)' : 'var(--accent-red)') : 'var(--text-primary)'}}>
                                                    {g}{i < seqGuess.length - 1 ? ' → ' : ''}
                                                </span>
                                              ))
                                            }
                                        </div>
                                        {seqRevealed && (
                                            <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:'10px', color:'var(--text-muted)'}}>
                                                Correct: <span style={{color:'var(--color-iac)'}}>{correctFixes.join(' → ')}</span>
                                                <div style={{marginTop:4}}>Score: <b style={{color:'var(--color-iac)'}}>{correctCount}</b> / {correctFixes.length}</div>
                                            </div>
                                        )}

                                        {!seqRevealed && !complete && (
                                            <div className="training-options" style={{gridTemplateColumns:'repeat(3, 1fr)'}}>
                                                {Object.keys(db.fixes).sort().map(f => (
                                                    <button key={f} className="training-option" style={{padding:'7px', fontSize:'10px', textAlign:'center'}}
                                                        onClick={() => setSeqGuess([...seqGuess, f])}>{f}</button>
                                                ))}
                                            </div>
                                        )}

                                        <div style={{display:'flex', gap:'6px'}}>
                                            {!seqRevealed && seqGuess.length > 0 && (
                                                <button className="btn-action" onClick={() => setSeqGuess(seqGuess.slice(0, -1))}>← Undo</button>
                                            )}
                                            {!seqRevealed && (
                                                <button className="add-btn" onClick={() => {
                                                    setSeqRevealed(true);
                                                    const right = seqGuess.filter((g, i) => g === correctFixes[i]).length;
                                                    if (right === correctFixes.length) setQuizScore(s => ({...s, right: s.right + 1}));
                                                    else setQuizScore(s => ({...s, wrong: s.wrong + 1}));
                                                }}>Reveal</button>
                                            )}
                                            {seqRevealed && (
                                                <button className="add-btn" onClick={() => { setQuizProc(null); startQuiz(); }}>Next →</button>
                                            )}
                                        </div>
                                    </div>
                                );
                            })()}

                            <div style={{fontSize:'10px', color:'var(--text-muted)', fontFamily:"'JetBrains Mono', monospace", textAlign:'center', lineHeight: 1.6}}>
                                Training uses all procedures in your current database.<br/>
                                Build more in the Build tab to expand the pool.
                            </div>
                        </>
                    )}

                    {tab === 'edit' && (
                        <>
                            {/* Create Fix */}
                            <div className="detail-panel">
                                <div className="detail-title">1. Create Waypoints</div>
                                <div className="form-group">
                                    <input className="form-input" placeholder="Fix Name (e.g. SBGR)" value={newFixName} onChange={e=>setNewFixName(e.target.value)} />
                                </div>
                                <div className="form-group form-row">
                                    <input className="form-input" placeholder="Lat (e.g. 22 20 09.10N)" type="text" value={newFixLat} onChange={e=>setNewFixLat(e.target.value)} />
                                    <input className="form-input" placeholder="Lon (e.g. 114 01 16.30E)" type="text" value={newFixLon} onChange={e=>setNewFixLon(e.target.value)} />
                                </div>
                                {fixError && <div style={{color: 'var(--accent-red)', fontSize: '10px', marginBottom: '8px', fontFamily: "'JetBrains Mono', monospace"}}>{fixError}</div>}
                                <button className="add-btn" onClick={handleAddFix}>Save Fix to DB</button>
                                
                                <div className="form-label" style={{marginTop:12}}>Existing Fixes ({Object.keys(db.fixes).length})</div>
                                <div className="item-list">
                                    {Object.entries(db.fixes).map(([name, coords]) => (
                                        <div key={name} className="item-row">
                                            <span>{name} <span style={{color:'var(--text-muted)'}}>[{coords[0].toFixed(2)}, {coords[1].toFixed(2)}]</span></span>
                                            <button className="item-del" onClick={()=>handleDeleteFix(name)}>×</button>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Create Procedure */}
                            <div className="detail-panel">
                                <div className="detail-title">2. Build Procedure</div>
                                <div className="form-group form-row">
                                    <input className="form-input" placeholder="Proc Name" value={newProcName} onChange={e=>setNewProcName(e.target.value)} />
                                    <select className="form-input" style={{flex: 0.5}} value={newProcType} onChange={e=>setNewProcType(e.target.value)}>
                                        <option value="SID">SID</option>
                                        <option value="STAR">STAR</option>
                                        <option value="IAC">IAC</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <input className="form-input" placeholder="Assigned Runway (e.g. 07R)" value={newProcRwy} onChange={e=>setNewProcRwy(e.target.value)} />
                                </div>
                                
                                <div className="form-label" style={{marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border)'}}>Select Fix to Add</div>
                                <div className="form-group">
                                    <select className="form-input" value={selectedWpToAdd} onChange={e=>setSelectedWpToAdd(e.target.value)}>
                                        {Object.keys(db.fixes).map(f => <option key={f} value={f}>{f}</option>)}
                                    </select>
                                </div>

                                <div className="form-label">Fix Constraints (Optional)</div>
                                <div className="form-group form-row">
                                    <select className="form-input" style={{flex: 1}} value={wpAltType} onChange={e=>setWpAltType(e.target.value)}>
                                        <option value="NONE">Alt: None</option>
                                        <option value="AT">Alt: At</option>
                                        <option value="ABOVE">Alt: Above</option>
                                        <option value="BELOW">Alt: Below</option>
                                        <option value="WINDOW">Alt: Window</option>
                                    </select>
                                    {wpAltType !== 'NONE' && <input className="form-input" style={{flex: 1}} placeholder={wpAltType === 'WINDOW' ? "Lower (Alt 1)" : "Altitude"} value={wpAlt1} onChange={e=>setWpAlt1(e.target.value)} />}
                                    {wpAltType === 'WINDOW' && <input className="form-input" style={{flex: 1}} placeholder="Upper (Alt 2)" value={wpAlt2} onChange={e=>setWpAlt2(e.target.value)} />}
                                </div>
                                <div className="form-group form-row">
                                    <select className="form-input" style={{flex: 1}} value={wpSpdType} onChange={e=>setWpSpdType(e.target.value)}>
                                        <option value="NONE">Spd: None</option>
                                        <option value="AT">Spd: At</option>
                                        <option value="MAX">Spd: Max (&lt;)</option>
                                        <option value="MIN">Spd: Min (&gt;)</option>
                                    </select>
                                    {wpSpdType !== 'NONE' && <input className="form-input" style={{flex: 1}} placeholder="Speed (kts)" value={wpSpd} onChange={e=>setWpSpd(e.target.value)} />}
                                </div>
                                
                                <button className="add-btn" style={{marginBottom: 12}} onClick={handleAddWpToProc}>+ Add Fix to Sequence</button>

                                <div className="form-label">Procedure Sequence</div>
                                <div className="item-list" style={{marginBottom: 12}}>
                                    {newProcWpts.length === 0 ? <div className="item-row" style={{color:'var(--text-muted)'}}>No fixes added yet.</div> : null}
                                    {newProcWpts.map((wp, idx) => {
                                        const a1 = formatAlt(wp.alt1);
                                        const a2 = formatAlt(wp.alt2);
                                        const s = formatSpd(wp.spd);

                                        const altStr = wp.altType !== 'NONE' ? `Alt: ${wp.altType} ${a1}${wp.altType==='WINDOW'? ' - '+a2 : ''}` : '';
                                        const spdStr = wp.spdType !== 'NONE' ? `Spd: ${wp.spdType} ${s}` : '';
                                        return (
                                            <div key={idx} className="item-row" style={{flexDirection: 'column', alignItems: 'flex-start'}}>
                                                <div style={{display:'flex', justifyContent:'space-between', width:'100%'}}>
                                                    <span>{idx + 1}. {wp.fix}</span>
                                                    <button className="item-del" onClick={()=>handleRemoveWpFromProc(idx)}>×</button>
                                                </div>
                                                {(altStr || spdStr) && <div style={{fontSize:'9px', color:'var(--text-muted)', marginTop:'4px'}}>{altStr} {spdStr ? ` | ${spdStr}` : ''}</div>}
                                            </div>
                                        );
                                    })}
                                </div>

                                <button className="add-btn" onClick={handleSaveProcedure} disabled={newProcWpts.length < 2 || !newProcName} style={{opacity: (newProcWpts.length < 2 || !newProcName) ? 0.5 : 1, background: 'var(--color-iac)'}}>
                                    Save Final Procedure
                                </button>
                        </div>
                    </>
                )}

            </div>
        </div>

        {/* ── Map ── */}
        <div id="map" ref={mapDivRef}>
            <button className="sidebar-toggle" onClick={() => setSidebarOpen(!sidebarOpen)} title="Toggle Sidebar" aria-label="Toggle Sidebar">
                {sidebarOpen ? (
                    isMobile
                      ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                ) : (
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                )}
            </button>

            <div className="map-fab-stack">
                <button
                    className={`map-fab ${dispOpts.declutter ? 'active' : ''}`}
                    onClick={() => setDispOpts(p => ({...p, declutter: !p.declutter}))}
                    title="Toggle Declutter"
                >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M6 12h12"/><path d="M9 18h6"/></svg>
                </button>
                <button
                    className="map-fab"
                    onClick={() => {
                        const map = fgRef.current.map;
                        if (!map) return;
                        if (activeProcs.length === 0) {
                            map.setView([22.3089, 113.9146], 10);
                            return;
                        }
                        const pts = [];
                        activeProcs.forEach(proc => proc.waypoints.forEach(w => {
                            const f = typeof w === 'string' ? w : w.fix;
                            if (db.fixes[f]) pts.push(db.fixes[f]);
                        }));
                        if (pts.length) map.fitBounds(pts, { padding: [60, 60] });
                    }}
                    title="Fit to Active"
                >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9V5a2 2 0 0 1 2-2h4"/><path d="M21 9V5a2 2 0 0 0-2-2h-4"/><path d="M3 15v4a2 2 0 0 0 2 2h4"/><path d="M21 15v4a2 2 0 0 1-2 2h-4"/></svg>
                </button>
                <button
                    className={`map-fab ${liveTraffic ? 'active' : ''}`}
                    onClick={() => setLiveTraffic(v => !v)}
                    title={liveTraffic ? `Live traffic: ${trafficStatus.source || 'loading'} (${traffic.length})` : 'Enable live traffic'}
                    style={liveTraffic && trafficStatus.state === 'err' ? {color: 'var(--accent-red)', borderColor: 'var(--accent-red)'} : {}}
                >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                </button>
                <button
                    className={`map-fab ${refOpen ? 'active' : ''}`}
                    onClick={() => setRefOpen(true)}
                    title="ICAO lookup (airlines / aircraft / airports)"
                >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
                {activeProcs.length > 0 && (
                    <button className="map-fab" onClick={() => setActiveIds([])} title="Clear Active" style={{color: 'var(--accent-red)'}}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg>
                    </button>
                )}
            </div>

            {refOpen && (
                <div className="ref-overlay" onClick={() => setRefOpen(false)}>
                    <div className="ref-modal" onClick={e => e.stopPropagation()}>
                        <div className="ref-head">
                            <div className="ref-title">ICAO Reference Lookup</div>
                            <button className="ref-close" onClick={() => setRefOpen(false)}>×</button>
                        </div>
                        <div className="ref-search">
                            <svg className="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input
                                className="ref-input"
                                autoFocus
                                placeholder="Callsign (CPA), type (B77L), airline name, airport ICAO…"
                                value={refQuery}
                                onChange={e => setRefQuery(e.target.value)}
                            />
                            {refQuery && <button className="ref-clear" onClick={() => setRefQuery('')}>×</button>}
                        </div>
                        <div className="ref-body">
                            {refLoading && <div className="ref-hint">Loading reference data…</div>}
                            {refError  && <div className="ref-hint err">{refError}</div>}
                            {!refLoading && !refError && refDb && !refQuery.trim() && (
                                <div className="ref-hint">
                                    Type anything — ICAO code (e.g. <b>CPA</b>), callsign (<b>CATHAY</b>),
                                    aircraft type (<b>B77L</b>), airline or airport name.
                                    <div style={{marginTop:6, color:'var(--text-muted)', fontSize:10}}>
                                        {refDb.airlines.length} airlines · {refDb.aircraft.length} aircraft types · {refDb.airports.length} airports
                                    </div>
                                </div>
                            )}
                            {refResults && (
                                <>
                                    <div className="ref-section">
                                        <div className="ref-section-title">
                                            <span>AIRLINES</span>
                                            <span className="ref-count">{refResults.airlines.length}{refResults.airlines.length === 25 ? '+' : ''}</span>
                                        </div>
                                        {refResults.airlines.length === 0
                                            ? <div className="ref-empty">— no matches —</div>
                                            : refResults.airlines.map((a, i) => (
                                                <div className="ref-row" key={`al${i}`}>
                                                    <span className="ref-code">{a.icao}</span>
                                                    <span className="ref-name">{a.name}</span>
                                                    <span className="ref-sub">“{a.callsign}”</span>
                                                    <span className="ref-meta">{a.country}</span>
                                                </div>
                                              ))}
                                    </div>
                                    <div className="ref-section">
                                        <div className="ref-section-title">
                                            <span>AIRCRAFT</span>
                                            <span className="ref-count">{refResults.aircraft.length}{refResults.aircraft.length === 25 ? '+' : ''}</span>
                                        </div>
                                        {refResults.aircraft.length === 0
                                            ? <div className="ref-empty">— no matches —</div>
                                            : refResults.aircraft.map((a, i) => (
                                                <div className="ref-row" key={`ac${i}`}>
                                                    <span className="ref-code">{a.code}</span>
                                                    <span className="ref-name">{a.mfr} {a.desc}</span>
                                                    <span className="ref-meta">{a.config}</span>
                                                </div>
                                              ))}
                                    </div>
                                    <div className="ref-section">
                                        <div className="ref-section-title">
                                            <span>AIRPORTS</span>
                                            <span className="ref-count">{refResults.airports.length}{refResults.airports.length === 25 ? '+' : ''}</span>
                                        </div>
                                        {refResults.airports.length === 0
                                            ? <div className="ref-empty">— no matches —</div>
                                            : refResults.airports.map((a, i) => (
                                                <div className="ref-row" key={`ap${i}`}>
                                                    <span className="ref-code">{a.icao}</span>
                                                    <span className="ref-name">{a.name}</span>
                                                    <span className="ref-meta">{a.country}</span>
                                                </div>
                                              ))}
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            )}
        </div>
    </div>
);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
